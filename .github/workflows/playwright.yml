# ============================================================
# FILE: .github/workflows/playwright.yml
# ============================================================

name: Playwright Tests

on:
  pull_request:
    branches: [ main, master ]

  # ── Manual trigger via GitHub UI ────────────────────────────
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "test"
        type: choice
        options:
          - dev
          - test

      browser:
        description: "Browser to run tests on"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all           # Runs every project defined in playwright.config.ts

      suite:
        description: "Test suite or tag to run (e.g. @smoke, @regression, or a filename)"
        required: false
        default: ""       # Empty = run all tests

      workers:
        description: "Number of parallel workers (1 = serial, leave blank = Playwright default)"
        required: false
        default: '1'       # Empty = use whatever is set in playwright.config.ts

      allure:
        description: "Generate Allure report?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  # ── 1. Preparation Job: Decides the execution matrix ──────────
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      browser_matrix: ${{ steps.set-matrix.outputs.browser_matrix }}
    steps:
      - id: set-matrix
        run: |
          CHOICE="${{ github.event.inputs.browser }}"
          # If triggered by a PR or user selects 'all', pass the full array.
          # Otherwise, pass just the single chosen browser.
          if [ -z "$CHOICE" ] || [ "$CHOICE" = "all" ]; then
            echo "browser_matrix=[\"chromium\", \"firefox\", \"webkit\"]" >> $GITHUB_OUTPUT
          else
            echo "browser_matrix=[\"$CHOICE\"]" >> $GITHUB_OUTPUT
          fi

  # ── 2. Execution Job: Runs in parallel across the matrix ──────
  test:
    needs: setup-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 60 
    environment: ${{ github.event.inputs.environment || 'test' }}
    
    strategy:
      fail-fast: false # Prevents one browser failure from instantly killing the other browser runs
      matrix:
        browser: ${{ fromJson(needs.setup-matrix.outputs.browser_matrix) }}

    # Dynamically updates the UI label to show exactly which browser this worker is processing
    name: "${{ github.event.inputs.environment || 'test' }} | ${{ matrix.browser }} | workers=${{ github.event.inputs.workers || 'default' }} | suite=${{ github.event.inputs.suite || 'all' }}"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Corepack ────
      - name: Enable Corepack
        run: corepack enable

      # ── 3. Node + Yarn cache ─────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'
          cache: 'yarn'

      # ── 4. Install dependencies ──────────────────────────────
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # ── 5. Enterprise Browser Caching ─────────────────────────
      #    Every matrix machine downloads the exact same unified cache file
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/yarn.lock') }}

      # ── 6. Deterministic Browser Provisioning ─────────────────
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install

      # ── 7. Explicit Linux Dependencies ────────────────────────
      - name: Install Playwright Operating System Dependencies
        env:
          PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: 1
        run: yarn playwright install-deps chromium firefox webkit

      # ── 8. Run Playwright tests ───────────────────────────────
      #    We now feed the specific matrix browser straight to Playwright
      - name: Run Playwright tests for sauce demo
        env:
          ENV:                              ${{ github.event.inputs.environment || 'test' }}
          BASE_URL:                         ${{ vars.BASE_URL }}
          STANDARD_USER_USERNAME:           ${{ vars.STANDARD_USER_USERNAME }}
          LOCKED_OUT_USER_USERNAME:         ${{ vars.LOCKED_OUT_USER_USERNAME }}
          PROBLEM_USER_USERNAME:            ${{ vars.PROBLEM_USER_USERNAME }}
          PERFORMANCE_GLITCH_USER_USERNAME: ${{ vars.PERFORMANCE_GLITCH_USER_USERNAME }}
          ERROR_USER_USERNAME:              ${{ vars.ERROR_USER_USERNAME }}
          VISUAL_USER_USERNAME:             ${{ vars.VISUAL_USER_USERNAME }}
          STANDARD_USER_PASSWORD:           ${{ secrets.STANDARD_USER_PASSWORD }}
          LOCKED_OUT_USER_PASSWORD:         ${{ secrets.LOCKED_OUT_USER_PASSWORD }}
          PROBLEM_USER_PASSWORD:            ${{ secrets.PROBLEM_USER_PASSWORD }}
          PERFORMANCE_GLITCH_USER_PASSWORD: ${{ secrets.PERFORMANCE_GLITCH_USER_PASSWORD }}
          ERROR_USER_PASSWORD:              ${{ secrets.ERROR_USER_PASSWORD }}
          VISUAL_USER_PASSWORD:             ${{ secrets.VISUAL_USER_PASSWORD }}
        run: |
          CMD="yarn playwright test --project=${{ matrix.browser }}"

          WORKERS="${{ github.event.inputs.workers }}"
          SUITE="${{ github.event.inputs.suite }}"

          if [ -n "$WORKERS" ]; then
            CMD="$CMD --workers=$WORKERS"
          fi

          if [ -n "$SUITE" ]; then
            CMD="$CMD --grep=$SUITE"
          fi

          echo "Running: $CMD"
          sh -c "$CMD"

      # ── 9. Upload report ─────────────────────────────────────
      #    We append the matrix browser to the artifact name so they don't overwrite each other
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ github.event.inputs.environment || 'test' }}-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30
      
      # ── 10. Upload Allure HTML report ─────────────────────────
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: ${{ github.event.inputs.allure == 'true' && !cancelled() }}
        with:
          name: allure-report-${{ github.event.inputs.environment || 'test' }}-${{ matrix.browser }}
          path: allure-report/
          retention-days: 30

      # ── 11. Upload traces on failure ──────────────────────────
      - name: Upload traces
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-traces-${{ github.event.inputs.environment || 'test' }}-${{ matrix.browser }}
          path: test-results/
          retention-days: 30
