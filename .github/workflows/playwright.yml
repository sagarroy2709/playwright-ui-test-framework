# ============================================================
# FILE: .github/workflows/playwright.yml
# ============================================================

name: Playwright Tests

on:
  pull_request:
    branches: [ main, master ]

  # ── Manual trigger via GitHub UI ────────────────────────────
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "test"
        type: choice
        options:
          - dev
          - test

      browser:
        description: "Browser to run tests on"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          # - all           # Runs every project defined in playwright.config.ts

      suite:
        description: "Test suite or tag to run (e.g. @smoke, @regression, or a filename)"
        required: false
        default: ""       # Empty = run all tests

      workers:
        description: "Number of parallel workers (1 = serial, leave blank = Playwright default)"
        required: false
        default: '1'       # Empty = use whatever is set in playwright.config.ts

      allure:
        description: "Generate Allure report?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  test:
    name: "${{ github.event.inputs.environment || 'test' }} | ${{ github.event.inputs.browser || 'all' }} | workers=${{ github.event.inputs.workers || 'default' }} | suite=${{ github.event.inputs.suite || 'all' }}"
    timeout-minutes: 60 
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'test' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Corepack ────
      - name: Enable Corepack
        run: corepack enable

      # ── 3. Pinned Node Engine + Yarn cache (Enterprise Best Practice) ──
      #    We pin this strictly to 22.22.2 to match your local setup exactly.
      #    This prevents random cloud updates from breaking your pipeline.
      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'
          cache: 'yarn'

      # ── 4. Install dependencies ──────────────────────────────
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # ── 5. Standard Cache Key (Enterprise Best Practice) ──────
      #    We tie the cache key solely to the OS and the yarn.lock hash.
      #    This means your pipeline retains a single, complete backup folder.
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/yarn.lock') }}

      # ── 6. Deterministic Browser Provisioning ─────────────────
      #    On a cache miss, we ALWAYS download the entire browser suite.
      #    This guarantees that Chromium is present for your global auth setup,
      #    even when you filter your actual tests down to run only Firefox.
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install

      # ── 7. Install System Dependencies Separately ─────────────
      #    Isolating this step ensures Ubuntu handles the system packages cleanly.
      - name: Install Playwright Operating System Dependencies
        run: yarn playwright install-deps

      # ── 8. Run Playwright tests ───────────────────────────────
      - name: Run Playwright tests
        env:
          ENV:                              ${{ github.event.inputs.environment || 'test' }}
          BASE_URL:                         ${{ vars.BASE_URL }}
          STANDARD_USER_USERNAME:           ${{ vars.STANDARD_USER_USERNAME }}
          LOCKED_OUT_USER_USERNAME:         ${{ vars.LOCKED_OUT_USER_USERNAME }}
          PROBLEM_USER_USERNAME:            ${{ vars.PROBLEM_USER_USERNAME }}
          PERFORMANCE_GLITCH_USER_USERNAME: ${{ vars.PERFORMANCE_GLITCH_USER_USERNAME }}
          ERROR_USER_USERNAME:              ${{ vars.ERROR_USER_USERNAME }}
          VISUAL_USER_USERNAME:             ${{ vars.VISUAL_USER_USERNAME }}
          STANDARD_USER_PASSWORD:           ${{ secrets.STANDARD_USER_PASSWORD }}
          LOCKED_OUT_USER_PASSWORD:         ${{ secrets.LOCKED_OUT_USER_PASSWORD }}
          PROBLEM_USER_PASSWORD:            ${{ secrets.PROBLEM_USER_PASSWORD }}
          PERFORMANCE_GLITCH_USER_PASSWORD: ${{ secrets.PERFORMANCE_GLITCH_USER_PASSWORD }}
          ERROR_USER_PASSWORD:              ${{ secrets.ERROR_USER_PASSWORD }}
          VISUAL_USER_PASSWORD:             ${{ secrets.VISUAL_USER_PASSWORD }}
        run: |
          CMD="yarn playwright test"

          BROWSER="${{ github.event.inputs.browser }}"
          WORKERS="${{ github.event.inputs.workers }}"
          SUITE="${{ github.event.inputs.suite }}"

          if [ "$BROWSER" = "all" ]; then
            CMD="$CMD --project=chromium --project=firefox --project=webkit"
          elif [ -n "$BROWSER" ]; then
            CMD="$CMD --project=$BROWSER"
          fi

          if [ -n "$WORKERS" ]; then
            CMD="$CMD --workers=$WORKERS"
          fi

          if [ -n "$SUITE" ]; then
            CMD="$CMD --grep=$SUITE"
          fi

          echo "Running: $CMD"
          sh -c "$CMD"

      # ── 9. Upload report ─────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ github.event.inputs.environment || 'test' }}-${{ github.event.inputs.browser || 'all' }}
          path: playwright-report/
          retention-days: 30
      
      # ── 10. Upload Allure HTML report ─────────────────────────
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: ${{ github.event.inputs.allure == 'true' && !cancelled() }}
        with:
          name: allure-report-${{ github.event.inputs.environment || 'test' }}-${{ github.event.inputs.browser || 'all' }}
          path: allure-report/
          retention-days: 30

      # ── 11. Upload traces on failure ──────────────────────────
      - name: Upload traces
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-traces-${{ github.event.inputs.environment || 'test' }}-${{ github.event.inputs.browser || 'all' }}
          path: test-results/
          retention-days: 30